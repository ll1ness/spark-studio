<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechOn Dialog</title>
    <style>
        body {
            font-family: 'TechOnCartoon', 'Courier New', monospace;
            padding: 20px;
            background: #030303;
            color: #f0f0f0;
        }
        .to-dialog-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 10000;
            display: none;
        }
        .to-dialog-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .to-dialog {
            background: #0c0c0c;
            border: 2px solid #1a1a1a;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            padding: 24px;
            position: relative;
            overflow: hidden;
            animation: to-dialog-appear 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .to-dialog::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(255, 255, 255, 0.02) 10px,
                rgba(255, 255, 255, 0.02) 20px
            );
            animation: matrix-dialog 20s linear infinite;
            pointer-events: none;
        }
        @keyframes to-dialog-appear {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        @keyframes matrix-dialog {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(20px, 20px) rotate(360deg); }
        }
        .to-dialog-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: transparent;
            border: none;
            color: #a0a0a0;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        .to-dialog-close:hover {
            color: #f0f0f0;
        }
        .to-dialog-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }
        .to-dialog-btn {
            padding: 10px 20px;
            border: 2px solid #1a1a1a;
            background: #0c0c0c;
            color: #f0f0f0;
            font-family: 'TechOnCartoon', 'Courier New', monospace;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .to-dialog-btn:hover {
            border-color: #f0f0f0;
        }
        .to-dialog-btn-primary {
            background: #f0f0f0;
            color: #030303;
        }
        .to-dialog-btn-primary:hover {
            background: #ffffff;
        }
    </style>
</head>
<body>
    <h1>TechOn Dialog Component</h1>
    <button class="to-dialog-btn to-dialog-btn-primary" data-dialog="dialog">Open Dialog</button>
    <div class="to-dialog-wrapper" id="dialog">
        <div class="to-dialog-overlay">
            <div class="to-dialog">
                <button class="to-dialog-close">&times;</button>
                <h2>Dialog Title</h2>
                <p>This is the content of the dialog. You can put any HTML content here.</p>
                <div class="to-dialog-actions">
                    <button class="to-dialog-btn to-dialog-close">Cancel</button>
                    <button class="to-dialog-btn to-dialog-btn-primary to-dialog-close">Confirm</button>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="dialog.js"></script>
</html>
