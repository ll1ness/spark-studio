<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechOn Accordion</title>
    <style>
        body {
            font-family: 'TechOnCartoon', 'Courier New', monospace;
            padding: 20px;
            background: #030303;
            color: #f0f0f0;
        }
        .to-accordion {
            background: #0c0c0c;
            border: 1px solid #1a1a1a;
            border-radius: 8px;
            margin-bottom: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .to-accordion:hover {
            border-color: #f0f0f0;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.03);
        }
        .to-accordion-trigger {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #0a0a0a;
            border: none;
            padding: 16px 20px;
            font-size: 14px;
            color: #f0f0f0;
            cursor: pointer;
            font-family: 'TechOnCartoon', 'Courier New', monospace;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .to-accordion-trigger::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.03),
                transparent
            );
            transition: left 0.6s ease;
        }
        .to-accordion-trigger:hover::before {
            left: 100%;
        }
        .to-accordion-icon {
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            font-size: 12px;
        }
        .to-accordion[data-open="true"] .to-accordion-icon {
            transform: rotate(180deg);
        }
        .to-accordion-content {
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 0;
            background: #0c0c0c;
        }
        .to-accordion[data-open="true"] .to-accordion-content {
            max-height: 500px;
        }
        .to-accordion-content-inner {
            padding: 20px;
            color: #a0a0a0;
            line-height: 1.6;
            border-top: 1px solid #1a1a1a;
        }
    </style>
</head>
<body>
    <h1>TechOn Accordion Component</h1>
    <div class="to-accordion" data-open="true">
        <button class="to-accordion-trigger">
            Section 1
            <span class="to-accordion-icon">▼</span>
        </button>
        <div class="to-accordion-content">
            <div class="to-accordion-content-inner">
                <p>This is the content of the first accordion section.</p>
                <p>You can put any HTML content here.</p>
            </div>
        </div>
    </div>
    <div class="to-accordion">
        <button class="to-accordion-trigger">
            Section 2
            <span class="to-accordion-icon">▼</span>
        </button>
        <div class="to-accordion-content">
            <div class="to-accordion-content-inner">
                <p>This is the content of the second accordion section.</p>
            </div>
        </div>
    </div>
    <div class="to-accordion">
        <button class="to-accordion-trigger">
            Section 3
            <span class="to-accordion-icon">▼</span>
        </button>
        <div class="to-accordion-content">
            <div class="to-accordion-content-inner">
                <p>This is the content of the third accordion section.</p>
            </div>
        </div>
    </div>
</body>
<script src="accordion.js"></script>
</html>
