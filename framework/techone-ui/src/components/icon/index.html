<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechOn Icon</title>
    <style>
        body {
            font-family: 'TechOnCartoon', 'Courier New', monospace;
            padding: 20px;
            background: #030303;
            color: #f0f0f0;
        }
        .to-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            line-height: 1;
            transition: transform 0.3s ease;
            cursor: pointer;
        }
        .to-icon:hover {
            transform: scale(1.2);
        }
        .to-icon::before {
            content: '📦';
        }
        .to-icon[data-size="s"] { font-size: 16px; }
        .to-icon[data-size="m"] { font-size: 20px; }
        .to-icon[data-size="l"] { font-size: 24px; }
    </style>
</head>
<body>
    <h1>TechOn Icon Component</h1>
    <h2>Sizes</h2>
    <div class="to-icon" data-size="s">📦</div>
    <div class="to-icon" data-size="m">📦</div>
    <div class="to-icon" data-size="l">📦</div>
    
    <h2>Hover Effect</h2>
    <div class="to-icon">📦</div>
</body>
</html>
