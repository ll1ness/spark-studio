<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechOn Icon Button</title>
    <style>
        body {
            font-family: 'TechOnCartoon', 'Courier New', monospace;
            padding: 20px;
            background: #030303;
            color: #f0f0f0;
        }
        .to-icon-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border: 2px solid #1a1a1a;
            background: transparent;
            color: #f0f0f0;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 18px;
            position: relative;
            overflow: hidden;
        }
        .to-icon-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }
        .to-icon-button:hover::before {
            width: 100px;
            height: 100px;
        }
        .to-icon-button:hover {
            border-color: #f0f0f0;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.03);
        }
        .to-icon-button[data-size="s"] { width: 32px; height: 32px; font-size: 16px; }
        .to-icon-button[data-size="m"] { width: 40px; height: 40px; font-size: 18px; }
        .to-icon-button[data-size="l"] { width: 48px; height: 48px; font-size: 20px; }
    </style>
</head>
<body>
    <h1>TechOn Icon Button Component</h1>
    <h2>Sizes</h2>
    <button class="to-icon-button" data-size="s">📦</button>
    <button class="to-icon-button" data-size="m">📦</button>
    <button class="to-icon-button" data-size="l">📦</button>
    
    <h2>Hover Effect</h2>
    <button class="to-icon-button">📦</button>
</body>
</html>
